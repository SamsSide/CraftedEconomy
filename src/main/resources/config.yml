# -------------------------------------------------------
# CraftedEconomy Configuration
# Author: SamsSide | craftedsurvival.net
# -------------------------------------------------------

database:
  # The hostname or IP address of your database server.
  host: "localhost"
  # The port your database server listens on (default MySQL/MariaDB: 3306).
  port: 3306
  # The name of the database to connect to.
  name: "craftedeconomy"
  # The database username.
  username: "root"
  # The database password.
  password: "password"
  # Prefix applied to all table names created by this plugin.
  table-prefix: "ce_"
  # Maximum number of connections in the HikariCP pool.
  pool-size: 10

currency:
  # Singular name of the currency (e.g. "Diamond").
  name-singular: "Diamond"
  # Plural name of the currency (e.g. "Diamonds").
  name-plural: "Diamonds"
  # The Bukkit Material that represents this currency as a physical item.
  item: DIAMOND
  # How many virtual units one physical item is worth.
  # e.g. exchange-rate: 1.0 means 1 Diamond = 1.00 virtual Diamond.
  exchange-rate: 1.0
  # Minimum amount that can be sent in a single /pay transaction.
  minimum-pay-amount: 0.01
  # Balance assigned to a brand-new account when it is created.
  starting-balance: 0.0
  # Java DecimalFormat pattern used to display balances.
  balance-format: "#,##0.00"

baltop:
  # Number of players shown per /baltop page.
  page-size: 10
  # How often (in seconds) the baltop cache refreshes from the database.
  cache-refresh-seconds: 60

messages:
  # All messages support & colour codes and hex colours &#RRGGBB
  prefix: "&8[&bCraftedEconomy&8] &r"
  balance-self: "&7Your balance: &a{balance} {currency}"
  balance-other: "&7{player}'s balance: &a{balance} {currency}"
  player-not-found: "&cPlayer '{player}' could not be found."
  pay-sent: "&7You paid &a{amount} {currency} &7to &e{player}&7."
  pay-received: "&e{player} &7paid you &a{amount} {currency}&7."
  pay-not-enough: "&cYou don't have enough {currency} to do that."
  pay-invalid-amount: "&cPlease enter a valid positive amount."
  pay-minimum-amount: "&cThe minimum payment amount is &a{min} {currency}&c."
  pay-self: "&cYou can't pay yourself."
  convert-to-success: "&7Converted &a{physical} {item} &7→ &a{virtual} {currency}&7."
  convert-from-success: "&7Converted &a{virtual} {currency} &7→ &a{physical} {item}&7."
  convert-not-enough-items: "&cYou don't have enough {item} in your inventory."
  convert-not-enough-balance: "&cYou don't have enough {currency} to convert."
  convert-inventory-full: "&cYour inventory doesn't have enough space to receive the items."
  convert-amount-too-small: "&cThat amount is too small to convert into any physical items."
  convert-invalid-amount: "&cPlease enter a valid positive amount."
  convert-invalid-direction: "&cInvalid direction. Use &fto &c(items → currency) or &ffrom &c(currency → items)."
  # /convert is console-only (driven by the banker NPC GUI). These cover console-side validation.
  convert-console-only: "&cThis command can only be run from the console."
  convert-usage: "&cUsage: /convert <player> <to|from> <amount>"
  convert-player-offline: "&cPlayer '{player}' is not online."
  baltop-header: "&8&m-----&r &bBalance Top &8— &7Page {page}/{total_pages} &8&m-----"
  baltop-entry: "&7#{rank}. &e{player} &8— &a{balance} {currency}"
  baltop-footer: "&8&m----------------------------------------"
  baltop-prev: "&b[← Previous]"
  baltop-prev-hover: "&7Go to page {page}"
  baltop-next: "&b[Next →]"
  baltop-next-hover: "&7Go to page {page}"
  baltop-invalid-page: "&cThat page doesn't exist."
  no-permission: "&cYou don't have permission to do that."
  console-only-players: "&cOnly players can use this command."
  error-generic: "&cAn error occurred. Please try again."
  # ── Admin economy (/admineconomy, /ae) ──────────────────────────────────────
  admin-usage: "&7Usage: &f/admineconomy <add|subtract|set|logs|reload> <player> [amount|page]"
  admin-add-success: "&7Added &a{amount} {currency} &7to &e{player}&7's balance. New balance: &a{balance}&7."
  admin-subtract-success: "&7Subtracted &a{amount} {currency} &7from &e{player}&7's balance. New balance: &a{balance}&7."
  admin-subtract-clamped: "&eBalance would go negative — clamped to &a0&e. New balance: &a0 {currency}&e."
  admin-set-success: "&7Set &e{player}&7's balance to &a{amount} {currency}&7."
  admin-notify-player: "&7Your balance was updated by a server administrator. New balance: &a{balance} {currency}&7."
  admin-invalid-amount: "&cPlease enter a valid positive number."
  admin-player-not-found: "&cPlayer '{player}' has never joined this server."
  # ── Transaction logs (/admineconomy logs) ───────────────────────────────────
  logs-header: "&8&m-----&r &bTransaction Log &7— &e{player} &8&m-----"
  logs-entry: "&8#{id} &7| &b{type} &7| &a{amount} {currency} &7| Bal: &a{balance_after} &7| &e{actor} &7| &f{timestamp}"
  logs-empty: "&cNo transaction history found for &e{player}&c."
  logs-footer: "&7Page &f{page}&7/&f{total_pages}"
  # ── Reload (/admineconomy reload) ───────────────────────────────────────────
  admin-reload-success: "&aConfiguration reloaded successfully."
  admin-reload-failed: "&cFailed to reload configuration. Check the console for details."
