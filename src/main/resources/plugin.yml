name: CraftedEconomy
version: '${project.version}'
main: net.craftedsurvival.craftedeconomy.CraftedEconomy
api-version: '1.21'
author: SamsSide
description: A production-ready economy plugin with Vault integration.

depend:
  - Vault

softdepend:
  - PlaceholderAPI

commands:
  balance:
    description: Check your balance or another player's balance.
    usage: /balance [player]
    aliases: [bal, money]
    permission: craftedeconomy.balance
  pay:
    description: Pay another player.
    usage: /pay <player> <amount>
    permission: craftedeconomy.pay
  baltop:
    description: View the balance leaderboard.
    usage: /baltop [page]
    permission: craftedeconomy.baltop
  convert:
    description: Convert between physical items and virtual currency.
    usage: /convert <to|from> <amount>
    permission: craftedeconomy.convert
  admineconomy:
    description: Admin economy management commands.
    usage: /<command> <add|subtract|set|logs> <player> [amount|page]
    permission: craftedeconomy.admin
    aliases: [ae]

permissions:
  craftedeconomy.balance:
    description: Use /balance on self.
    default: true
  craftedeconomy.balance.others:
    description: Use /balance <player> on others.
    default: op
  craftedeconomy.pay:
    description: Use /pay.
    default: true
  craftedeconomy.baltop:
    description: Use /baltop.
    default: true
  craftedeconomy.convert:
    description: Use /convert.
    default: true
  craftedeconomy.admin:
    description: Parent node — grants all admin subcommands.
    default: op
    children:
      craftedeconomy.admin.add: true
      craftedeconomy.admin.subtract: true
      craftedeconomy.admin.set: true
      craftedeconomy.admin.logs: true
  craftedeconomy.admin.add:
    description: Use /admineconomy add.
    default: op
  craftedeconomy.admin.subtract:
    description: Use /admineconomy subtract.
    default: op
  craftedeconomy.admin.set:
    description: Use /admineconomy set.
    default: op
  craftedeconomy.admin.logs:
    description: Use /admineconomy logs.
    default: op
